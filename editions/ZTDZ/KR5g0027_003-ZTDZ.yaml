front:
  text: 正一法文經章官品卷之三物十
  hash: sha256:39527383c8176173ecd2af876e231110879f527cc1fb12475f981de994b70249
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0027_SJB_003-280549c, image: sjb/28/280549c.png}
body:
  text: 主斬草二部君官將吏主爲辟斥𡻕殺月殺日殺時殺葬送斬草收葬送塚墓鬼太隂君官將九地君將某君將等各二人官將一百二十人請舉工監作一合下主監臨葬送葬送君將吏兵一合下主營護道士所發起居葬送之鬼九玄察炁君宫將一百二十人主治西驛室主收天下葬埋之鬼爲精祟者太白中陣明皇君官將一百二十人主收捕禁塚一切之鬼各令伏匿葬埋後請復還治也左都侯君官將一百二十人治太清元室主收天下兵塜鬼絶墓丘丞墓相塜中二千石爲祟病人者漢明玄君官將一百二十人治五俗室主收室墓鬼九甲君官將一百二十人治九坎室主收天下民間石開葬埋上啼哭衰麻合客令無禍事疾病大言君官將一百二十人治母渠室主收天下萬民葬埋後有疾塜訟之鬼主之地畜靈宫將一百二十人治廣靈室主收塜堠墓卿石祅鬼太玄君官將一百二十人治母渠室恍愡妄走下治之不差收塚葬送逆順鬼塚訟之鬼造功吏一合來下營護發䘮處道路不得阻遏九天君官將一百二十人治地里室收天下萬民葬埋收勑十二月建墓鬼解土謪九地君官將一百二十人治茂里室主收天下萬民葬埋收勑十二月建十二月墓鬼解求適主葬埋巳訖續得疾病塜中有訟連禍郷邑者大神人君官將一百二十人治其室主收移從繕治作塜日食禁忌之鬼章驛君官將一百二十人治泰請室主收主墓絶墓神丘丞墓伯塜中千二石爲民作精祟者九徳君官將一百二十人治越性室牢帥塜五害不利不到墓養命之鬼赤玄君官將一百二十人治少陽室主收天下諸墓耗鬼秦關得明君官將一百一十人治少室主收天下自稱刑謪之鬼素車白馬君兵士十萬人主收十墓鬼將軍比考之破逆君官將一百二十人治漢仙室主收萬民洲墓狂𦍙之鬼精陽方君官將一百二十人治天門室主收天下諸墓功太𡻕大將軍太玄眞符攝下女青詔書主之塜墓之鬼演豹君五人官將一百二十人治五諾室主收天下墓鬼河伯河水使者十二人後事小郵驛馬故行主收捕塜墓男女之殃𦍙太黄太極君符下女青詔書地下二千石泰山二十四獄主收塜墓之鬼太素太始君五人官將一百二十人一合下符攝地二千石女青詔書丘丞墓伯十二塜鬼無上髙蒼君兵十萬主收先祖五墓之鬼來着子孫者主之主土公鬼制地君五人官將一百二十人治冝泉室主收天下髙卑太𡻕行年本命上土公之鬼制地君官將一百二十人治地里室主收天下土公之鬼九德君官將一百二十人治水室主收天下土公之鬼安石君官將一百二十人治玄黄室主收天下諸山獵精土公之鬼主土炁鬼剛武敢徤君吏一合下部將軍吏主收捕天下土炁之鬼天匠君官將一百二十人治垂室主作營鎮收十二時役使主四百功禁忌之鬼仙官激炁君官將一百二十人治四川室主收百功禁忌之鬼治起土方丈舎東西傍主之揚方君官將一百二十人治天龍門室主收太𡻕大將軍十二月建土炁安玄君官將一百二十人治丙午室主收捕天下水土公之鬼平石君官將一百二十人治南犯室主收天下髙卑土公一百二十人禁忌土公逆鬼主井竃鬼太上前校大兵四十九萬人主收一百二十井竈鬼主治竈鬼無上監炁君兵十萬衆主收竈伏龍形德殃注竈祭耗虚鬼鑪火玉女千二百人赤衣主收一百二十竈鬼中伏炁漢明地黄皇君官將一百二十人治理室黄門主收天下自稱温竈靈之鬼主移徏宅合都邑大神君官將一百二十人治其却室主收天下萬姓娶移從架起宅舎繕治蓋屋制正月食禁忌之鬼縣邑君官將一百二十人治其却食室主收移徒宅舎仙官昌息一人官將一百二十人治食逆室主收天下萬民移徙繕治作舎治墓令人福利土地里域君官將一百二十人主移徙舎官將軍主天下萬民作舎移徙昌落君一人官將一百二十人治城昌室主收移徙太歳大將軍玄都君一人官將一百二十人治北都室主收天下解五部將移徙故炁主吏居宅救君官將一百二十人治倉明室主收百姓破隳居宅不利奴婢六畜主收護之天玄君官將一百二十人治安關室主萬民舎不可居利宅收諸鬼災炁怪主之利宅天陽君一人天休君五人官將一百二十人治扶君泉室主收宅中衰耗不利牛馬六畜下此神保護令盛好不復死亡頻元君吏功曹左右官各五人官將一百二十人主解諸考謪令室宅安穩解患君官將一百二十人治倉室令主爲人民解宅滳破不止者安利家居赤沙君官將一百二十人治南昌室主收天下五蠱六𩲃之鬼百二十凶吹入宅舎利之天官君官將一百二十人治安洋室主民人宅舎不可居收攝殺炁百怪之鬼仙官計平君官將一百二十人始赤水室主收宅殺自稱刑宅破鬼諸繕治君將吏兵各一合下在郷里中監察助某起治事訖三日一時無他言舉遷始陽平君官將一百二十人治七俗室主收河龍七獄吏宅殺鬼青帝君官將一百二十人治靈明絳匱宅主收天下萬民舎虚耗北始道元君官將一百二十人治靈明室主治萬民破貴亡賤有不利者主之主嫁娶釀泉君官將一百二十人治白玉室主飲食賀慶和合神炁之主左右冝春君官將各一百二十人治正陽室主收天下嫁娶時鬼爲人作精符命相尅之左右冝春君官將一百二十人治隂陽室主收天下人民嫁娶時鬼爲人作精祟者稱符命相尅主之日月君一人官將一百二十人治隂陽室主天下男女嫁娶舎客主利合男女竟年壽天處君官將一百二十人治五衛室主萬民嫁娶娉合尅制四時鬼合符命令有貴子玄來君一人官將一百二十人治冨女室主天下男女嫁娶令妻夫致二萬𡻕延年嫁娶吏一合下主萬民嫁娶監臨營衛使其安穩歌樂君一人官將一百二十人治隂陽室主收天下萬民嫁娶飲食合㑹賔客成生和合男女皆令喜𥬇符命益傳九炁玄機君官將一百二十人治中庭室主收移徙嫁娶時鬼病人者主之赤靈君官將一百二十人治激室主治天下萬民嫁娶時鬼主之歌唱君一人官將一百二十人治𢖍室主萬民嫁娶㑹合得冝令有男女左右宣奉君官將一百二十人治陽歸室主天下萬民嫁娶時鬼主之天陵君官將一百二十人治五𢖍室主萬民嫁娶娉合時合有貴子主之仙官昌樂君一人官將一百二十人治地威室主收天下百姓作㕑食護之天貴黒衣兵士十萬衆生立收一百二十人時鬼嫁娶廻彺言語請素白玄明官將一百二十人治部城室主解天下女子嫁娶生命在天年𡻕星逆鬼之中有若嬶鬼妬神醜宿惡星拘刑鬼天懸尸六害肌骨刑禍不冝翁姑夫子者主收之中室敢徤吏左右隂陽嫁娶吏千二百人主收捕九室炁主嫁娶九倉君官將一百二十人治目還室主收天下嫁娶飲食合㑹生成和合男女符命年壽玉暦君官將一百二十人治九天室主解天下男女嫁娶年命在天年𡻕星之中不冝夫妻少子孫者下此神保護之使年長相冝北平君官將一百二十人治群城室主解天下嫁娶不冝姑翁生命在天年𡻕星逆鬼之中各有𡜍鬼妬神醜宿惡星懸尸六害胞形骨消不冝子孫者下此神保護之使命長相冝天大夫君官將一百二十人治五行室主收萬民嫁娶聘令制使得倍收五榖君官將一百二十人治大水室主令田五色禾苖秀好令少草一畒得百斛辟蟲䑕熊兎猪鹿令不犯害水旱和適主之地畜君官將一百二十人治四明室主民人種𤓰瓠茂好倍得天甲君一人官將一百二十人治地户室主民禾谷令無蟲䑕主之無野君官將一百二十人治地盡室主萬民佃求利無蟲䑕耗不害收得百倍正一法文經章官品巻之三
