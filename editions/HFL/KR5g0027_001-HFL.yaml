  text: 正一法文經章官品卷之一
  hash: sha256:bc96cef217bd7fc76ac2782ec8a599743762ad73a163042fe0c6ac3a894ceb60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0027_HFL_001-001a, image: hfl/0880/0880-044.png}
body:
  text: 收土公若病肌内消盡性命垂困當請天官揚秩君官一百二十人君吏一百二十人合治之若乆病著家請須㬰君官將一百二十人令治之赤天食炁君官將一百二十人主收家惡鬼爲祟害者若家故殮不寜夢惡錯亂魂魄不守請收神土明君官將一百二十人治之三炁慰愈君五人官將一百二十人都星君官將一百二十人斷家鬼伏連石安君都星君誅殃君各一人官將一百二十人斷外家亡人復連髙都君朔平君官將一百二十人青龍源水君九水丈人水帝君又請水平政君兵士十人又請安官置官官將一百二十人分解水君又請諌議大夫十二人經隱眞君談君主和諭先亡東海太睦𡍼君官將一百二十人主收勾星狐狢之精并收瘧陽方君將一百二十人治青龍宫安上君官將一百二十人治玄黄室石都侯君官將一百二十人治隂陽室安石君官將一百二十人治玄眞室安和君官將二十人治丙午室考召考官吏收解宅内四面土公軍兵收怪天昌君黄衣兵士十萬人主收捕某宅中一百二十人殃怪中外強𦍕十二刑殺來作病者消除之兵星太白君十萬人主收捕精魁祟災害之家恐作文字不可知召窮竒使噉怪鬼消除之又請天網君官將一百二十人主利宅舎安炁君官將一百二十人治安丹宫主隱治宅中鬼炁逆亂分别功賞令神還令道明太玄君一人官將一百二十人治逆室主民宅不可居主利收諸殃殺災怪赤沙君官將一百二十人治靈昌室主收自禰五蠱六𩲓之鬼一鬼二吹耗害宅舎上利之道元炁君官將一百二十人治室舎主收天下萬民宅舎及吹解諸横禍之鬼天玄君一人官將一百二十人治安邦室主收萬民不可居收殺鬼災怪主利宅舎青龍君官將一百二十人治匱室主萬民虚耗不冝六畜主利宅舎收官事冠帶君官將一百二十人治五門室主民人犯官事繫牢獄易了四顧君官將一百二十人治青蓋室主壓伏官怒仇刑害止之令甚不到口舌消滅之清倉君官將一百二十人治巨門室主壓伏官事怨仇刑害止之八門君一人官將一百二十人治太皇室主壓收制官事怨仇刑害止之角周趙女三千七人披髮能制官事怨刑禍止之官席君官將一百二十人治巨門室主爲某解除官事囚繫牢獄令解散出北一官左童君官將二百二十人又請收刑檢刑逆吏一百一十人主爲某斷絶縣官惡人謀議口舌牢獄當爲平集消滅之察惡君官將一百二十人治髙平室收捕郡府某𡜍妬䜛人毀傷不止者破諸謀議衆心休息捶天動地君九天兵士五十萬人衆主收地上逆盗賊主之營星君官將一百二十人治越宮主爲天下萬民追逐安穩塜墓都侯君將吏一百二十人治太清宫主收墓鬼文意君官將一百二十人治内㳮宮主收塜訟鬼九玄察炁君官將一百二十人治西釋宫主收葬埋土公鬼九地君官將一百二十人治平治宫主收葬埋之鬼地甲君一人官將一百二十人治壞宫主天下萬民開塜户啼哭言害解首過三公節日月九考郎候龍使者六甲父母宫將一百二十人主解天下千二百考吏手書自澄者形和炁君官將一百二十人治具寄宫主收諸祭酒譴考相及伐者正炁君殺之天還君白衣兵士千一萬衆主收諸考吏察之天西辰君一人赤衣裳兵士十萬人主收考召正炁所主天宫時頓治功曹左右功曹五人官將一百二十人主治田宅解考之察炁君治名宮主收諸祭酒食肉淫泆者主察殺之太清天營兵士百萬人衆主收三千六考察止之四明君官將吏一百二十人主勑祭酒治舎炁不安穩主禁考訟鬼之不正逆炁解訟者考炁分别清濁國三老白兔君官將一百二十人治駱城宫主治中鬼亂考召帥罪過不正神爲帥督下曹分别官吏兵解帥罪禍畢女君一人官將一百二十人治仙宫室主解諸祭酒犯録止禁飲酒食肉行輕重於民間姦好淫通之罪皆使無他國三老白巽君一人官將一百二十人治駱威室主治中惡犯考召吏罪功過分别斷主解考召察姦君一人官將一百二十人治仙名山室主祭酒食肉民子淫盗解之誹謗呪詛主行君將一百二十人治平地室主有功之吏誅惡養善常令神還令道明五徑君官將一百二十人治圵上室爲祭酒某絶斷萬民口舌不行令逢殃禍主之察惡君官將一百二十人治髙平室主收地上道俗人萬民狂語泄道非非眞毀賢主之剋冠惡君將一百二十人治髙平室收天下出狂語他炁非眞傷賢之清靈六鐘太皇君五人官將一百二十人治石仙室主制百姓口舌變闘正收其炁令萬民同心相見喜恱善之炁上清玄君兵士十萬人主收天下道俗萬民爲人作口舌誹謗呪詛罵者收考之南鐘六星君五人官將一百二十人治仙合君主收百姓口舌一百二十人變剋令民人同心𥬇喜南鐘六星君五人官將一百二十人治仙石室主收百姓逆吏口舌使萬民同意合心五衡君官將一百二十人治玉女室主有功之吏誅惡養善主之左慧右喜君官將一百二十人主爲某斷絶屯里中道俗百姓口舌無令近我身仙官玉女千二百人主喚天生炁吐精能制殃禍口舌災禍不生縣官口舌天曹省念分别願請東方青帝丈人君吏五十人又請南方赤帝大夫君吏五十人又請西方白帝大夫君吏五十人又請北方黒帝大夫君吏五十人又請中央黄帝大夫君吏五十人又請斬斧湯父官將千二百人又請破市大將軍千二百人又請破嶽大將軍千二百人又請脫擊大將軍千二百人又請解患大將軍千二百人又請散事大將軍千二百人又請鎭承大將軍千二百人五部大夫君吏七部天官將一合來下主爲回化官事若有逆吏夢人縣官口舌所見増疾者啓所在監察考召三師二十四君將吏某奉道行身修眞種德而爲惡人甲遂吏某等所見増疾某受道宣化得當助國治民佐天行化扶命養善伐惡等長短欲見傷善願請東方大領神父西方大領神母南方大領神父圵方大領神母中央大領神君主領惡人逆使某口舌不語從此絶若某欲見口說者又請太隂君吏十二人爲某收捕魂令文墨下舉口舌不起四方縣官衆祟伏恩主治保六畜凡畜養牛馬驢騾等列毛色頭數啓百蟲畜收王相君將吏一合來下主者養畜七六營肥徤蕃息無有折傷天儀君官將一百二十人治休官主爲民某養六畜息無死主之昊水期官將一百二十人治赤雲室主及天下六畜疾病之精祟收之天陽君一人官將一百二十人治夬君肉室主萬民宅中不利牛馬保護之令好盛不死逐盗賊天位君五人官將一百二十人治扶宗君主人家宅不盗賊刼抄東西太白君官將一百二十人治天乾室主爲天下郡郷亭里域萬民刼抄盗賊殺之者察之萬姓君官將一百二十人治和仙室主萬民心腸不正盗賊掠取刼抄主收之日男千二百人赤衣主收天下盜賊怨仇主之月女千二百人白衣主收天下女子爲人盗賊刼收之貶君官將一百二十人治百角室主天下隂陽十二種官將行列返逆老之承天大兵十萬人赤幘丹衣主及百姓更相刼掠男女隂陽悖亂却減之上暦逆清玄君百萬人收地上盗賊逐捕逃亡全不得脫日月大兵十萬人絳衣主隂陽爲漢國辟捕千賊萬盗主收之壽命度厄南上君官將一百二十人治倉果室開天門益人壽命病者得愈殃禍者消滅之壽命君官將一百二十人治安昌室主爲天下萬民致壽命延此度厄不衰南昌君官將一百二十人治列庫室歴犯周旋八紀之中脫下死籍還著本命消滅三蟲伏長生不老八十歳更爲十五童明堂絳室君官將一百二十人治城宫室主祭酒心傷萬端還壽延年管度世神仙逆人不行天公君一人衛郎三萬九千人刑生可以此世過厄千歳解厄君官將一百二十人主爲解除年命之上刑厄𡜍星妬鬼精鬼祟殺害過度衰厄録魂長生玉女素暦千二百人衣赤衣主致長生承差具録某身三魂七魄不得逺離某主長生疾病差除素女千二百人主致長生延命疾病具録魂魄無令逺人身精人安周現君將一百二十人治地理宫主致一百二十生炁神衣赤幘節禁人三魂七魄不棄人身保命延年長八百歳玉女醫疾若命在水中當各轉出之若命在棺中當爲破出之若在獄中當多掘出之若命在𣗳當爲下之若命在獄中當多開而出之若命在墓塜中當爲開而遣之若禄命盡者當爲増之若文書拘攝當爲决放之若事天官時見省理之兆民有急以時差愈大龍君一人官將一百二十人治七星室主罷天下卜問醫藥灸剌血令無不行主之東明大夫君五人官將一百二十人治天帝宫主操持煉藥治男女當使服之山周君一人官將一百二十人治始生室玉女素女五童致仙藥神方爲小兒黄衣即命玉女月玄玉女千二百人白衣持神方典治男女被病人差愈上清太仙明堂玉女千二百人主致神藥一合下典治某身中所苦消滅天醫官醫太醫五官治病醫吏各十二人一合下詣某處入某身中五臟六腑十二宫室布流一百二十關節行神布炁典治痛處重勑某身治病功曹爲所請官將醫吏共案行某身從頭至足治肺察炁六脉浮沉沉處爲安浮處爲散滌除五臟安穩六腑辟斥故炁飲食鬼賊精妖疾疫使殺兵寒災散與人相逺離得蒙恩祈苦除愈以爲効信治風毒癩病玉女君官將一百二十人治長命室主二十四炁主典治某身癩病毒蟲浮風取苦災患除赤丙子仁君官將一百二十人治又傷室主天下玉女布行丹田之炁主治萬蟲癩病毒蠱消除之收先祖病子孫無上方蒼君兵士十萬人主收却先祖五墓之鬼未病子孫者分别生死之炁斷絶耗害主之無上方官君兵士十萬人主收先祖病子孫語者主收斷之收死人耗害都星君一人官將一百二十人治青蓋室主解星死斷絶復連制三殺災滅咎殃不得復連生人素車白馬君兵士十萬人主收十二墓鬼未病生人者斷絶之無上天君兵士十萬人收某家中水火湯注乙石二十刑殺之鬼却死未生復連殃注之炁消滅之都官君官將一百二十人治太隂室主收某家中星死血親之鬼耗亂人者斷絶之天玄君官將一百二十人治少陽室主收却塜墓鬼祟病主人者石安君官將一百二十人治始室主收死人未爲精祟者斷絶耗害之石仙君將一百二十人治天下萬民家中外亡強𦍕之鬼厭絶注鬼爲人精祟者轉相注易後生人疾病者死主斷絶之誅殃君官將一百二十人治倉明堂主爲某收斷死次還流逆殺殃咎復連生人者斷絶之若故婦致來注病生人請大皓大典者吏收攝故婦致魂魄檢押死人某不得令還賊病生人又請太白兵星勞惑吏一合下收死時煞炁消滅絶復連葬死送收塜訟九地君官將一百二十人治地理宫爲萬民出䘮葬埋收正月至十二月建墓鬼葬埋以續疾病呪訟鬼法所爲主之郷大神官將百二十人治其官主萬民移徙繕治作塚月食禁忌之鬼主之右郡候君官將吏一百二十人治泰玄室主收丘墓之鬼絶墓神兵墓伯塚中二千石爲民作精祟大言官君將一百二十人治安渠室主收天下萬民葬埋之後死人不安疾病生人者墓塚之鬼九玄察炁君一人官將一百二十人治四澤室主自禰葬埋土公之炁除滅消散之九地君一人官將一百二十人治宫室主萬葬埋勑堤收萬鬼解過主葬埋之地申君一人官將一百二十人治𡑞宫主天下萬民開塚户啼哭言窖令厭有歳病録祭酒求録三云節月九候龍使者六甲父母官將各一百二十人觧夭千二百考吏等書自證者形和氣君官將一百二十人治旦寄室收諸祭酒譴考相及代者正典直殺之天還室白衣兵十萬衆生諸考吏察正之天西辰君一人赤衣裳兵士十萬人主收考召正炁所主大宫時頓治功曹左右功曹五人官將一百二十人主治田宅吏觧考主之察炁君治名山宫主收考諸祭酒飲食肉淫佚者主祭殺之四明君五人官將一百二十人勑祭酒治舎炁不安穩主禁下正炁觧法考分别清濁正炁國三考白兔君官將一百二十人治駱城室治中鬼亂考召師罪過下此神爲師馬天下切分别官吏兵解罪師過畢女君一人官將一百二十人治仙室主解祭酒犯録上禁忌飲酒食肉行輕重於民間姦淫通之罪皆使無它國三考白巽君一人官將一百二十人治駱城室主治中惡犯考吏罪過分别釋玉解考君察姦君一人官將一百二十人治名山室主祭酒犯録飲酒食肉民子淫盗解之犯籙可用移從吏主營護某家男女釜竈六畜移徒出宅開通無它却十二辰禁忌護蚕滋好恭食君官將一百二十人治明系室主萬民養蚕卧起齊光澤滋出以系如意供食君將一百二十人治天禄宫主爲萬民蚕徤食解好中神男神女玉男玉女素男素女玄男玄女養蚕滋母温室新婦等各二十四人合下誥詣某蚕室中温暖之保護令滋好同收𢇁萬倍無有傷之田作𤓰瓠田作種種當啓所部署宫四野五野七野都平君城山川祇稷社召亢白蚕君主保五榖苗莖滋好結子成實收入萬倍九野君官將一百二十人治地盡宫主萬民田作求利蟲兒不害鹿走得百倍五榖君官將一百二十人治大水宫主萬民五榖草易理苗莖滋好收深猪熊疾蟲蝗群精消之收穀百倍天田君官將一百二十人治地房宫主萬民種禾令收大得之五田外田九野都平君自營歳終田作五穀今爲俗有異詭馬谷一斛以爲勑信五千王君官將一百二十人治九水室主萬民田作手法六畜君官將一百二十人治明堂主萬民主𤓰瓠收子倍得無有死傷逺行萬里萬里君官將一百二十人宣祖諱治炁室主萬民逺行萬里道里四通不逢禍殃北馬君一人官將一百二十人治室房室主將帥逺行不爲惡吏所得令輕身自行千里明堂玉女千二百人衣白衣主逺民逺行萬里不逢殃痾難主之萬福君官將一百二十人主保萬民逺行萬里道路滑利却死來生轉禍爲福收除殃殺姓還無它思所意所所從心市買欺許驛駱門監市君官將一百二十人治天市室主收天下害鬼考治生殃屠沽酒開店賣與百姓貧民𥝠行輕秤少升詐誕欺人主之無上萬福君吏二十八人求五利金銀布帛綿絹榖米錢物所思者至所索者皆得主治招財求利北面昌盲君一人官將一百二十人治北水室主水船人賦買重量大㪷賣利詐誕都市不中考之無上萬福君官將一百二十人主求五利金銀布帛所思者得所願者成天河君官將吏一百二十人治九江室主記録河伯勑水更生爲休莫加月三輔之張三鈎三荀郷得叛道求還化炁君官將一百二十人治赤免赤收叛民某從使還得化属道不得稽遲主之九㑹君官將一百二十人治還宅主從九天召吏下方民令且化之属道主來之九㑹君官將一百二十人治還室主從九天考召吏收叛民户主來祭酒開心夫子君官將一百二十人治紫微蓋室主男女官祭酒心腹童蒙令之化聖使都却鬼語玉仙君官將一百二十人治太素主女官祭酒心腹童蒙令之化聖使知鬼女五經化炁君將一百二十人治九竒室主祭酒童蒙令自受敎使炁治民若開心思明衆與有異請五星二人官將一百二十人下注某身請周天八極君左右隂陽明决吏十二人下并某身隱意定志入山不渇蓋天君官將一百二十人治道門室主請山神師入名山道却神可在致山道玉女素女主之青城壽暦十二人赤綺衣主爲師長生一百二十年方入名山泰謂飽吏左右五人官將一百二十人主制三尸令人不飢渇長生王域行㕑君官將一百二十人治王門室主令師制炁不食不飢可入名山不用粮精廣神也童子金倉君官將一百二十人治神皇室主致谷食炁可入名山不飢渇同炁至仙官制天君官將二十人治文人室主祭天官道鬼號不别炁曆師祭酒得道下屯神分别主之天倚邦君五人治五辰室主師守中神願美色好老更丁一日天倚國君五人治五辰室主籍師五精守中神還精美色丁莊華景君官將一百二十人治白玄室主師入山精思面七曰念面色土水上無還年不老隂陽炁備之五瘟傷寒計天君官將一百二十人治六丁室主收連藉傷寒思炁歷亂地官督炁君五人官將一百二十人治上文室市中五瘟傷寒男子疾病地城伐吏五人官將一百二十人治難室主收治某里五瘟傷寒女子復連疾病運炁解厄君兵士十萬辟斥五瘟傷寒功時破殺之鬼五瘟都炁兵士四十萬人主收惡炁五瘟傷寒鬼殺之炁北闕九夷君五人官將一百二十人治大苗室主收里中傷寒狼藉吏民被狂惑北里太皇君五人官將一百二十人治行室主收里中傷寒拔髮咽喉翁天巿大夫君一人官將一百二十人治成室太祖諱臣胤生主治萬民復連傷寒絶音不能語振夫大兵十萬人赤幘天冠主收天下自稱五色瘟病之鬼百神炁君一人官將一百二十人治難室主收天下五瘟傷寒鬼病人者北闕九夷君官將一百二十人治天戴寳主收市里傷寒病疾吏民披髪狂足忌罵言錯亂討天君官將一百二十人治六丁室主收疾病時瘟毒之鬼若在船上得属者傷寒連病相易五瘟之鬼北城賊君五人官將一百二十人主治熱病亡言語之鬼北城九夷君官將一百二十人治滿室主收船車傷寒相連歴疾病狂忽喉壅身災北黒大機君五人官將一百二十人治大行室主收五瘟傷寒時熱之病正一法文經章官品卷之一
