front:
  text: 正一法文經章官品卷之四物十一
  hash: sha256:9c32b4f056bcfa716da4b50c3b665302bd427d5816eaf257e10b73efb8ca48d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0027_HFL_004-001a, image: hfl/0880/0880-152.png}
body:
  text: 主蚕桑附時鬼符命有貴子山澤君官將一百二十人治隂陽室主天下崖蚕自天父母蚕供養君官將一百二十人治天系宫萬民男女喜生蚕令解耗有倍得仙官玄女玄男神女神男玉女玉男素女素男等吏養蚕絲綿吏合下主爲萬民將養蚕辟斥蟲䑕皆解好仙官玄女神女玉女素女玄男神女及諸君丈人官將各一百二十人蚕室主蚕吏營衛令去蟲䑕令蚕伐耗神男玄女主採桑餧玄女主簿素女主蠒黄白分明玉竟君五人官將一百二十人治倉室主男女犯天年𡻕君逆炁不冝妻子者天竟君五人官將一百二十人治洛䑓室主解男女違犯天年𡻕星不冝夫妻者地竟君五人官將一百二十人治洛䑓室主解男女違天年𡻕星不冝子者開天元君五人官將一百二十人治食室主解男女犯𡻕星使冝妻子安穩清廉考召征伐君吏主收嫁娶時之禁忌媚固𡜍妬之鬼主田種天林君五人官將五人各一百二十人治民人田種五谷令倍收地林君五人官將一百二十人治四相室主治民人田種下谷倍得天田君官將一百二十人治北門室主民人種作苗稼辟却蟲䑕令好有倍利二炁陽元君官將一百二十人治黄雲室主收蟲䑕犯暴之傷田種所部置田四野七野九野都平君城神山川社稷神君護某稻禾榖令熟美好無令損害辟斥蟲䑕𡻕冬入増倍以爲効信五千玉君一人官將一百二十人治九水室主民人田作令苗秀好主六畜秦皇太元君官將一百二十人治地玄宫主民人六畜令増息天僕君官將一百二十人治休行宫主萬民養六畜令日熾盛不死亡傷主人秦皇定炁君官將一百二十人治九地室主民人養六畜不成不茂令使増息赤玄天北水井君五人官將一百二十人主治天下六畜牛馬皆使𩔗蕃息黒小騏君官將一百二十人赤靈君主天下牛馬六畜疫病之鬼收三十六精祟欲畜養生馬猪牛烈色數啓百蟲畜收王相官將一合來下令其蕃息主漁捕太治官請主厚君吏一合下收捕故炁飲食之鬼漁捕射獵各各慈心不相侵害太河君官將一百二十人治九江室主絶録河伯勑水吏主爲捕獵人主慈愍心棄釣焚網别求宅利天河君官將一百二十人治九地室主民人汙池藕葦芰蕉求得萬倍主人九河大漁君官將一百二十人治玄谷室主萬民汙池使四面魚鱉各得其性不爲精害人水却君一人官將一百二十人治河龍室主天下萬民汙池沼渚一切水族捕十二目精鬼怪營護部界主賈巿天巿君官將一百二十人治珮室主治天下諸巿召考官稱詐小秤小斗不正入勑巿長致理民主之地面昌上君官將一百二十人治百水室主天民乗舟車販賣賤交貴貨重金小斗固不利人詐誕都巿不中之人無上萬福君吏二十八人主來冝五利金銀錢絹布帛𢇁綿谷米所思皆黄生主之驛騎門監巿君官將一百二十人治天巿室主天下諸部惡鬼考治生坐列屠沽開廬作酒者百姓貪民侈利輕秤小斗詐䛘欺人從民飲食者考之朱廬君官將一百二十人治太元堂主天下金銀鋼鐡錢物不變化欲求金銀銅鐡下此神主百禍治生田蚕吏兵營護收得百業盡成都巿監察考召君官將吏兵一合主天下萬民百估治生令得主之求利百福君并合屬將吏生王道炁一合下主民人百病求欲皆得主行來出入明星玉女千二百人白衣主將正一逺行萬里不逢禍害災厄難主之受南奉君官將一百二十人治天倉室主令師出來不用衣粮萬民自來溉食之萬里君五人官將各一百二十人治九紀室主將帥正一逺行令無獲難禍害道里四通千里外營護無它主之萬里君五人官將一百二十人治引炁室主止一及萬民逺行不逢禍害以自營護乃行天奉君官將一百二十人治天倉室主師行不持精用萬民未漑道上三玄四玄四始甲子諸官君三十六官君亭傳客舎瑩署注鬼主行來出入有取至諸天馬君一人官將一百二十人治石房室主將帥逺行不爲吏兵所呵令人身體輕便日行千里不用粮主逺千里君里將一合下主將送天下萬民逺行營護無令它憂千里君官將一百二十人及佑護將君萬福丈人等一合下主營護逺行者主解囚繫牢獄青倉君一人官將一百二十人治豆行室主罷厭官怨仇刑禍令各解散消亡不作天諸室主天獄精君執事吏諸獄君屬之文書監察君官將一百二十人治九天諸室主天下獄注吏諸獄屬之冠帶君官將一百二十人治五明室主解萬民犯事繫在牢獄下屯神令繫者易得解去魚國玉女三千六百人被髮持蠱趍解官事上千二百刑禍却止之尊神斬斧或陽部君主解囚繫牢獄令得解散顚倒將軍破水將軍絶繫將軍收符檢傳將軍主脫厄難囚繫牢獄令得解散主解官事都星君一人官將一百二十人治青蓋室主解官事仙官玉女千二百人主喚天生炁吐精能制解官事主縣官口舌大小熒星戰闘兵龐咄律君反君逆解兵衣鐡復刄下營護民人縣官口舌南鍾天星君五人官將各一百二十人治石仙室主收攝百姓縣官口舌吏民惡逆之者令心玄同主官事怨仇天願君官將一百二十人治青蓋室主官事怨仇主人八關君地君五人官將一百二十人治西宫主逐捕女子劫掠人夫痛心令自還本主主收盗賊令還星君一人官將一百二十人治各逆宫主逐捕天下萬民盗賊不亡主之日月大兵十萬人赤幘紅衣主隂陽爲漢困追捕千賊惡逆主之日男千二百人衣赤衣主捕天下盗賊怨仇萬民爲惡逆者主之百姓君一人官將一百二十人治和山宫主天下民人心腹正戻盗取劫抄奸好主之東西太白君官將一百二十人治九天乾宫主天下郡縣郷亭里域萬民劫掠奸好謀殺戾便罪考蔡之五陽君官將一百二十人治門宫主男子不翼祖諱劫盗萬物罪不正收之三哭君官將一百二十人治玄都宫主捕天下逆人西方大將軍一合下爲天下萬民逐盗摇天動地君九炁君兵五十萬衆生收地人逆人盗賊相掠亂者承天大兵十萬人赤幘天冠朱履主收百姓男女更相劫掠一人官將一百二十人治蜀下室主解吏民制官事仇怨刑禍口舌却召之四願君官將一百二十人治陽蓋室主解官事怨仇主之主口舌誹謗無上清玄君兵百萬衆主收萬民爲人作口舌呪詛罵詈蠱人荼毒之鬼無上百福君兵千二百人主收諸人思作諸禍變口舌炁人精主之地官王女千二百人衣五彩衣戴通天冠主收地炁吐精沐制刑禍口舌清靈六種五經君一人官將一百二十人治北上宫主絶口舌師正一民子不行口舌誹謗大道不令人逢禍害主絶口舌天皇君五人官將各一百二十人治萬仙室主制百姓口變門收正其炁令萬民同心相見喜𥬇朱雀君官將一百二十人治浴平室主護萬人令客飲食營陣聚衆乆令無怨惡者制止口舌南鎭六星官將一百二十人治含光先官主收利百姓口舌萬二十禍變合萬人同心𥬇喜河北紀浴水周開逆吏送人役屯還正主收口舌誹謗城周越女兵三十億萬人主收口舌誹謗天越女三十億萬主收口舌惡逆誹謗越上君官將一百二十人治陽明宫收吏民返逆誹謗道法欲令鬥者主收之主劫掠夫妻天林天君五人官將一百二十人治百宫收捕亡夫痛人必令自得林杜君五人官將各一百二十人治男主劫掠人夫妻痛必收予自得姹里官一人官將一百二十人治左劉宫主天下女子不謹輕遥逐夫即得之歲星君五人官將各一百二十人治耗宅宫主天下男子不謹掠人妻求逐人亡逐則得之𡜍星君官將一百二十人治左列宫主天下女子不謹翼祖輕滛逐人亡逐則得之禁天君五人官將一百二十人治南昌室主逐捕男子劫掠人夫妻痛人必令得之禁地君五人官將一百二十人治先宫逐女子不謹殺夫痛人必不收之即得上逐亡人君官將一百二十人治綱紀宫主萬民奴婢逃亡追之令自得天官五人官將各一百二十人治南宫主逐捕男子劫掠人妻痛必令自還本主措亂者無上督逆君兵十萬人主逐盗賊逃亡令自來還主利征戰攻伐啓將軍戰故遣吏請人庫二十萬人衆及揺天動地無上九炁君兵馬恊輔十方衆及四面眞官注炁君與同心兵士所同如意無令毀傷主請雨九江北玄君官將一百二十人治河天宫主天下炁出風雷令符興雲日中下雨天公明正炁君官將一百二十人治中天宫主炁水風雷合符迅雲下日大雨海日玉女千二百人衣赤衣持雲炁雨泉下風雨制宴河上眞人君官將一百二十人治北大理宫主爲天下吏民縣官致晏雨四洲九江君五人官將一百二十人治太山宫主起雲雨水炁九江九海玄君官將各一百二十人河宫主水炁風雨合符雲日中下雨以爲効信雲下雨主風雨靈䑓宫中漢明君官將一百二十人主攝天雷炁名主人宫中小玄明君宫將一百二十人主攝河伯吕公子三十六水帝十二溪女九江河平侯作掾吏部水鬼興雲下雨天河宫中九江北玄君官將一百二十人主下水炁風雷合符沉雲日中下雨太山宫中四水九谷君官將一百二十人收水炁諸河伯水帝子三十六人下雨太山宫中四水九谷君官將一百二十人主起炁水炁湖中玉女千二百人衣赤衣持雲炁水泉下風雨制宴主晴九江北玄君官將一百二十人治中丙宫青節霖雨請晏主之天翁正炁君官將一百二十人治内中宫主月節上霖雨晏三日爲始効信主之江上玉女千二百人衣白衣持天炁主捕九雷精霖雨致晏天公正炁君一人官將一百二十人治食明宫主月節霖露雨水清晏黄昏白日請天皇正一法文經章官品卷之四
