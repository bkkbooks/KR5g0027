body:
  text: 收萬精鬼破逆君將一百二十人治漢仙室主百姓男女病精魅中刑犯易披髮狂走還格因稱神鬼語稱和言皆主之天樂君五人官將一百二十人治五水室主收治女子狂易披髮奔走天地精君官將一百二十人苗林宫收治男女按髮狂易之病主之大角獄君官將一百二十人治五大行宫主收天下有物萬精來著人者除滅之髙脊君官將一百二十人治寄明宫主收天下龍蛇災害人者實地君一人官將一百二十人治文宫主收考地上獸之精諸道行逆劫真強病之九天前司馬千二百人絳衣赤幘主收天下木石之精魅胡將軍千二百人各將胡兵士十萬人主能收天地身稱為道五龍之精考之九諫君一人官將一百二十人治成信宫主收天下自稱河伯水龍蛇之精病人者主之北玄君一人官將一百二十人治皇宫主收龍蛇精老虎精主之三氣賜功君一人官將一百二十人治黃雲室主收天下老鼠之精魅病人者主之山秦皇老君一人官將一百二十人治地室主天下崖石之精主之旌明中徹君一人官將一百二十人治俗室收天下萬物之精魅主之明郎君一人官將一百二十人治安莊室主收天下自稱妖精為毒害諸精天封大兵士十萬人黃衣收龍蛇之精狂歌自為之神主者澤明都君一人官將一百二十人主治天五平室主天下自稱考神蛇雀石草木精魅廣老君一人官將一百二十人治倉室主收天下鋒召之鬼主治百精主治顚癎地黃君官將一百二十人治女顚狂病狂言之𧵥絹榖天門大營君官將一百二十人治太上室治男女顚狂癎病主之土陽君一人官將一百二十人治閬空主收捐天殺馬癎病之鬼主治之非門君一人官將一百二十人治安樂室收捕天下八節十二辰能治顚病之鬼地門君天營五人官將一百二十人主治女子雉癎顚病地星營星官將一百二十人治上靈室主治驚狂之鬼天玄關閉君一人官將一百二十人治星機官主男女狂易之論天樂君官將一百二十人治五九室主治女子狂易被髮呼走之病治目病左右青田君一人主典治目痛目痛令三日除差鬼消滅陽天君主治男女徽日之痛主治之除差舟明君一人官將一百二十人治孔次室主治目竇海出督十歲之病可治之百玄玉女二百人持神方艮藥主治男子目竇之病大明君一人官將一百二十人治明堂治男子目海生督十歲之病治之注變君官將一百二十人治髙夏室主治目病主治之逆注君治右室目病令人除差明鏡君官將一百二十人治關陽室主兩目睡子精視萬里目見形影知吉凶日月君官將一百二十人治欣室主治吏民目海生篤病十成治之天厭君黑衣兵士十萬人主收一百二十人并竈鬼令人生目之目今立差天明君五人官將一百二十人治男室主治男子左目生目之目今差面目上諸毒立差地明君五人官將一百二十人治北室生男女子左目之目今差天癡君黑衣兵士十萬人主收一百二十人竈鬼病人目生目主治差明君五人官將一百二十人治北室主治男女目痛今差治耳聾天壽君一人官將一百二十人治仙貢室主治男子聾十歲主治之天鼓君官將一百二十人治大素室主治男女子喑聾主治之天尊君官將一百二十人治仙真主治男子女耳聾十歲不聞言語治之治齒頰喉痛元計君左右二十四人主治男女齒今差元和君官將一百二十人主治男女口齒頰腫口中生惡瘡主治之百吉君官將一百二十人治項安君至治之齒瘡勑咽中癃治之九焦君五人官將一百二十人治九節宫主治男女口齒勑咽中痛今差天九候君官將一百二十人主治男子咽喉腫痛舌強氣結主之地八節君官將一百二十人主治女子咽喉腫痛舌強氣結主之治解社竈太上剪板兵十萬人主為萬民收解天下一百二十人井竈鬼為人作精祟斷之周天玉女千二百人赤衣三環角結主男女百病竈鬼所為平神君官將一百二十人治陽照宫主收解社竈未害人者分别之無上太衡兵士十萬人主解星社來作祟病者捉勑社神解放生魂還附之身中不得拘攝永相去離分别鬼祟絶斷耗害除劫須散之主法君五人官將一百二十人治五姓宫主治男子面身體生瘡癰犯十二訾竈大玉女千二百人赤衣收一百二十人竈祟病人者主解蟲鼠精怪三氣陽無元君官將一百二十人治黃靈室主收精怪之精南山白虎將吏主收除宅內群鼠犯害驅離無令留停治劫殺注無上化不君兵士十萬人收一百二斗注鬼殺氣却死來生主之無上萬官君兵士十萬人收地上逆淫注氣消滅無上平天君兵士十萬人主收天下一百二十人殃注鬼殺在人身中者消滅之部吏赤天道室考騎老逆將軍二人太君二人都官從事老對殺君各有種數千人不營守某家保護男女若牙身中除去死籍更迎生名捕死者某死生注清濁之氣破殺尸殃之恩得老稚正法髠笞五百斬殺有罪死合平復連更相牽引治解牢獄尊神斬斧疾湯部君又請顚倒將軍絶斷將軍出囚出魂將軍收氣出氣將軍出徙囚繫將軍收符拾傳將軍合下速為解脫牢獄效治蛇蚖五毒山夷君官將一百二十人治令倉室主收蚖蛇毒蠱山中萬獸虎狼精毒氣殺消滅之先生君一人官將一百二十人治神水室主為萬民醫治蛇蚖五毒精殺不得行主收某身中五毒之鬼蟲蛇嚙人毒入腹中毒氣不行令差之天上白蛇君三十九人收萬民為蛇毒之鬼所中便得氣不行治腫癰鼠漏地八節君官將一百二十人治大丹室主治女身爛喉腫各強氣之病白玄解激君一人官將一百二十人治隂明室主治女晨夜音喉翁惡赤治之地天冡君官將一百二十人治九漢室主治女子得瘤疽下血主治之天覆君五人官將一百二十人治周星室主治男子頸翁血主治之九天九病君官將一百二十人治下冢室主治男子喉翁舌強主治之省氣君官將一百二十人治七靈治萬民翁癰脆水病主之天覆君官將一百二十人治周星主治男子頸癰夜下血鼠主治之九天候君官將一百二十人治下冢室治男子喉翁舌強繫絶主治之地覆君官將一百二十人治九候室主治男子頸瘤癰顆下血鼠漏主治之侯君一人官將一百二十人治井室主治女子翁舌病主之地八節君一人官將一百二十人治五星室主治男子手足癰疽久病不差魂魄拘繫者治風痺痿赤舌君官將一百二十人治上俗室主治女子大風治死飢今差黑氣溫水君官將一百二十人主治女子大風死飢病主治之起氣君五人官將一百二十人治安平安主治人痿跛偏枯主治之天水君五人官將一百二十人治上俗室主治女子大風病邪主之起地君五人官將一百二十人治上三千室主治女子四肢偏枯痿黃令差交路君五人官將一百二十人主男女苦雨肶上氣風痺兩腳上不隨疼痛不能行步治久病淋露五佷君官將一百二十人治久病淋露當骨消定痛水邪滅百病痛七政君官將一百二十人治陽室主天下隂陽官吏病稽留令差主治之白玄宅氣君五人官將一百二十人治太真室主治女子十歲落病連𣾰收骨治之差主君官將一百二十人治玄胎星主收捕某身中携病之鬼著床卧來為精屯稽留不差者主治瘧病倉母君五人官將一百二十人主治男子瘧病之鬼作沉重主令消滅之中室玄武瘧吏嬰兒一合下并力主治男子瘧病鬼令差治男女百病地戾營君五人官將一百二十人治上室主治男女百病之鬼令差經官素女千二百人同還結忌主固治男女百病令差天地強亂君一人官將一百二十人治正室主為師復連痛氣曆禁錮之鬼按摩君一人官將一百二十人治陽明室主治男女四肢疼痛主治之犯天正亂君一人官將一百二十人治端正室主師治人之久病不差氣錯不同主之魄天君五人官將一百二十人主治男女病關節令差頸無禮君功曹五人官將一百二十人主治男女腰膝病治之蓋化司侯君三祖九和主人吐病令差蓋地司侯君三祖九和主解治之吐病之鬼八風周害君吏一百二十人主治君病一目治男子百脈病天君隂陽林君官將吏左右一百二十人治男子黃疸病九向北海君主治男子病水之鬼令立差太隂君一人官將一百二十人治蘭室主治男女驚病之鬼九河北海君官將一百二十人治河元室主治男女病小腹之痛令立差主水能前醫所不治者天官五行君官將一百二十人治大比丘平室主男女吸咄不能匡義腹中痛令立差地官五行君官將一百二十人治太室主吸咄不能飲食匡義腹中痛令立差天官五行三五七九君官將一百二十人主治男女隂暘閉塞不通利腫痛生瘡主治之九河君官將一百二十人主治男女大小便不通主治之封離君十二人主男女心腹痛臍下便拘急激滿帶下十二之鬼主之也省玉君官將一百二十人治七令室主治男女頭脊腫痛生瘡令差𧵥巨炭𥿄筆等官君五人官將一百二十人主治男肩臂手腫令差天傾君官將一百二十人治五氣室主治女子下赤白晝夜不止十二病絶嗣言生君官將一百二十人治安樂室主天下雲中一百二十神三十六主病某心腹背脊四肢骨節戴眼吐沫口禁驚掣之鬼收除之赤選君五人主攝四面八方之鬼嬰向君二十人主收食雲中閉一㓛消滅剛強吏兵主典治雲中所病之鬼主為某身收掠除十二時鬼消除之地灰榮感五人官將一百二十人治太上中室主治某身所苦雲中病滅之石明君官將一百二十人治執治室主誅除符病飲食精魅之鬼為某收捐邪鬼主立解除之朱都主官將一百二十人治蘆陽室主天下萬魅百精災某身者收邪鬼等病者為某摧滅之保産生胎妊陽氣君官將一百二十人治經室主保女子産解易兒時出母子無它留難聽敵君官將一百二十人治平害室主為郎差女性受命令懷妊無它主之嬰兒乳母吏主乳某胎兒使調暢交好護胎吏主護某胎成日月成滿堅固受氣萬産醫吏輔易某身使差速易母子端正度脫無他考召考官吏主收解宅內四面土氣破射妨害殺氣消滅身無宅胎妊安穩期文君官將一百二十人治小仙室主女子産乳難子橫胎中病風面以時下之主治雜病白玄氣君一人官將一百二十人治父王室主治大子落病主治之四明君一人官將一百二十人治下食室主治男女死飢病主治之夫玄君瑩官將一百二十人治含威室生渴男女消渴羸格治之男陽君一人官將一百二十人治河倉室主小兒厭赤陽黃常淋露三年主治之嬰兒君一人官將一百二十人治河倉室王小兒厭赤陽常淋露二年主冶之天靈天童君一人官將一百二十人治髙平中室主扶凍東王陵君五人官將一百二十人主治逆氣令差太衡君五人官將一百二十人治凶至室治男女過地星路吸咄主治之督金君官將一百二十人治盧黃室治男女幘微露之踵主治之救欺君一人官將一百二十人治倉明室主治百姓破墮不利救護之解患君官將一百二十人治下倉室主為民解宅破墮不正者主之南上君官將一百二十人治食果室主開主門蓋人壽長令短三日差去非痊不得病人胸脅天昌君黃衣兵十萬人主為收除宅中一百二十人殃怪中外𦍙殃十二刑殺之鬼來作惡夢怪病者除之東明大夫君治天帝室道來宣諱上字三風隨惡精痊留病主治之治衆疾病老毒君官將一百二十人治赤白室主收千二邪因及逆不正之祟鬼中央天兵士十萬人赤幘君主收捕緒帥行刑及返逆不正者九天九丈人兵士各十萬人主治地留室主男女十嵗淋露病下此神收察中牢獄地五行君官將一百二十人治木室主治女子同帶下癖淋露咄吸並主治之天五行平君官將一百二十人治丘平室主治男過下淺癖淋露吸吐主治之三祖君天翁祠母五人官將一百二十人治消各祖山室主父隨所在天功君左右王侯各二十四吏治男女色美主治之天官隂陽狄君官將一百二十人速氣吏左右七十一人主治嬴病右續令天三人即千船治急病攻心欲絶主治之扶清太一公華蓋君二十四官將一百二十人治三侯室九狂心膈扶清後部司馬和夏君八十四人官將一百二十人主心府治收邪師扶清東主𪌏君官將一百二十人主治逆氣令差赤師君一人官將一百二十人主治女子隂門中下血絶子帶下十一時病主治之太主星君一人官將一百二十人主治逆氣令差天中國大兵四百萬人主收捕送氣瘴氣天上東海赤天內君百萬人主收一百二十符即飲食之鬼治收糴鬼赤天萬靈君一人官將一百二十人治陽水室主收天下大逆不正之鬼考治之蓋天大考將軍十萬人主收捕天下飲食橫行鬼賊為人作精祟病人者收治之髙麾大鼓五湖將軍及甲逆鱗兵士四十萬衆生收捕故氣逆鬼行凶者無上黃周君兵一百萬人主收此時司命強殺人之鬼收之無上中國大兵士四百萬人主收除邪氣妖鬼北都君官將一百二十人主收太歲將軍飲食之鬼無上四開君兵士十萬人主收破萬氣十二逆之鬼太上督天兵四十萬人主收自稱皇天上帝之鬼北上君官將一百二十人治天留室北斗七星精共時十二殺大傅君官將一百二十人治西平室主收某家符廣鬼賊上頓人家作狀主責求飲食作害者太平君官將一百二十人治北朔室中官君將一百二十人治陽春室主收天下六丁六甲之鬼責民血食之鬼北平五門君官將一百二十人治朱陽室收自稱天地父母從民責飲食之鬼北曹五千君官將一百二十人治朱陽室主收天地父母從民責飲食之鬼玄天君官將一百二十人治北都室主收大歲將軍從民求飲食者赤王君官將一百二十人治天北室主收北時司命從民取食鬼者北天君官將一百二十人治主室收天下自稱五帝飲食之鬼九氣君官將一百二十人治七徹室主收天下身稱天翁從民求飲食之鬼靈官官將一百二十人治戒室忌主收自稱皇天上帝飲食之鬼天願白候將軍兵士十萬人主收自稱天地水三官萬道逆殺鬼考問人不得從民求飲食收考天地破惡大氣兵百衆生主收天下萬民二千道千鬼百靈君官將一百二十人治平天室主收天下五色蟲毒之鬼無上九天丈人中堅大兵百主收自稱千二道鬼天罡大五丁君兵百萬人主收符破廟多怨坐席血食逆鬼考責藏不得令脫玄老大將軍十二人官將一百二十人主收三官逆氣稱神道也無上無土君五人官將一百二十人主捕收天下衆老之精糴神兵稱官號者又請上千師萬聾聖鬼殺消除之治喑啞百舌君一人官將一百二十人主治喑啞不能言語領氣吏平定身中治舌痛九氣蜚舌君一人官將一百二十人主治男女久病咳嗽主治男女解罪辭曹君官將一百二十人治仙里室主責疾者辭語男女大小心化自欺過手罪差素赤君五人官將一百二十人治赤虛室主治男女百病所苦造逆思過改愍復差白素君五人官將一百二十人冶和陽室主治女子百病所苦告道思道更攺心腹差天渴者萬二千金為祭酒男女吏兵文世其羅過即受此神陽先君一人官將一百二十人治陽食室治天下男女百病取在苦心神思道即差隂先君一人官將一百二十人治陽食室主治天下女子百病取在苦心神思道即差天倉君一人官將一百二十人治天溜室主天師連曆當下此神兆民病不欲者醫治之主治解呪詛述氣君官將一百二十人治素室主病者中刑犯萬國被禱閉固犯易主刑禱八卦玄天君官將一百二十人主收一百二十刑固之鬼全被呪詛病積日不差羸嬰著狀思道者復不差請魁𩲃吏一合下主收某身中之呪詛盟要惡逆之鬼強絶之魂魄道不理者鐡釣其分持天丁甲六千鐡杖打殺無令得脫晨被刑禱病呪詛與人相憎戾相嫉妬有二心分居異處校計不同首以除差詳破𦍙君一人官將一百二十人治在山室主天下男女解此鬼令人病者愈起若為百姓取厭固不利人者天田君官將一百二十人下收捕隂差了𧵥市二十隨輕重正一法文經章官品卷之二
